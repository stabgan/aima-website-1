# Site settings
title: AIMA Exercises Showcase
email: contact@aimacode.com
description: >-
  A showcase website for Artificial Intelligence: A Modern Approach (AIMA) exercises.
  Features interactive exercise content and modern web design.

baseurl: "" # the subpath of your site, e.g. /blog
url: "https://stabgan.github.io" # the base hostname & protocol for your site
github_username: aimacode
repository: stabgan/aima-website-1

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO settings
author: Kaustabh Ganguly
twitter:
  username: pnorvig
  card: summary

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
